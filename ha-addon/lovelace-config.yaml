# =============================================================================
# Plant-State — Home Assistant Configuration
# =============================================================================
# Add these sections to your configuration.yaml
# Replace PLANT_STATE_IP with your host IP (e.g. 192.168.1.176)
# Then restart HA.
# =============================================================================

# --- Step 1: REST command to fetch task data ---
rest_command:
  garten_aufgaben:
    url: "http://PLANT_STATE_IP:8000/dashboard/relevant-now-live"
    method: GET

# --- Step 2: Template sensor (updates every 15min + on HA start) ---
template:
  - trigger:
      - trigger: time_pattern
        minutes: "/15"
      - trigger: homeassistant
        event: start
    action:
      - action: rest_command.garten_aufgaben
        response_variable: result
    sensor:
      - name: "Garten Tasks"
        unique_id: garten_tasks_sensor
        state: "{{ (result.content | from_json) | length }}"
        icon: mdi:flower-tulip
        unit_of_measurement: "Aufgaben"
        attributes:
          tasks: "{{ result.content }}"

# =============================================================================
# Step 3: Lovelace Markdown Card
# =============================================================================
# In your HA dashboard, add a Manual Card and paste the contents of
# ha-addon/lovelace-card.yaml

